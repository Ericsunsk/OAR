name: oar

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    image: oar-backend:local
    environment:
      OAR_HTTP_BIND_ADDR: ${OAR_HTTP_BIND_ADDR:-0.0.0.0:8080}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      OAR_FEISHU_BASE_URL: ${OAR_FEISHU_BASE_URL:-https://open.feishu.cn}
      OAR_FEISHU_MAX_RESPONSE_BYTES: ${OAR_FEISHU_MAX_RESPONSE_BYTES:-65536}
      OAR_FEISHU_REQUEST_TIMEOUT_MS: ${OAR_FEISHU_REQUEST_TIMEOUT_MS:-30000}
      OAR_FEISHU_CONNECT_TIMEOUT_MS: ${OAR_FEISHU_CONNECT_TIMEOUT_MS:-5000}
      OAR_FEISHU_APP_ID: ${OAR_FEISHU_APP_ID:-}
      OAR_FEISHU_APP_SECRET: ${OAR_FEISHU_APP_SECRET:-}
      OAR_FEISHU_REDIRECT_URI: ${OAR_FEISHU_REDIRECT_URI:-}
      OAR_FEISHU_AUTHORIZE_BASE_URL: ${OAR_FEISHU_AUTHORIZE_BASE_URL:-https://open.feishu.cn}
      OAR_FEISHU_AUTH_SCOPE: ${OAR_FEISHU_AUTH_SCOPE:-}
      OAR_ALLOW_EPHEMERAL_GRANT_KEY: ${OAR_ALLOW_EPHEMERAL_GRANT_KEY:-}
      OAR_GRANT_KEY_ID: ${OAR_GRANT_KEY_ID:-}
      OAR_GRANT_KEY_HEX: ${OAR_GRANT_KEY_HEX:-}
      OAR_AGENT_PROVIDER: ${OAR_AGENT_PROVIDER:-}
      OAR_AGENT_OPENAI_BASE_URL: ${OAR_AGENT_OPENAI_BASE_URL:-}
      OAR_AGENT_OPENAI_API_KEY: ${OAR_AGENT_OPENAI_API_KEY:-}
      OAR_AGENT_OPENAI_MODEL: ${OAR_AGENT_OPENAI_MODEL:-}
      OAR_AGENT_ANTHROPIC_BASE_URL: ${OAR_AGENT_ANTHROPIC_BASE_URL:-}
      OAR_AGENT_ANTHROPIC_API_KEY: ${OAR_AGENT_ANTHROPIC_API_KEY:-}
      OAR_AGENT_ANTHROPIC_MODEL: ${OAR_AGENT_ANTHROPIC_MODEL:-}
      OAR_AGENT_ANTHROPIC_VERSION: ${OAR_AGENT_ANTHROPIC_VERSION:-}
      OAR_TENANT_MAINTENANCE_ENABLED: ${OAR_TENANT_MAINTENANCE_ENABLED:-}
      OAR_TENANT_MAINTENANCE_INSTANCE_ID: ${OAR_TENANT_MAINTENANCE_INSTANCE_ID:-}
      OAR_TENANT_MAINTENANCE_INTERVAL_MS: ${OAR_TENANT_MAINTENANCE_INTERVAL_MS:-}
      OAR_TENANT_MAINTENANCE_DUE_LOOKAHEAD_MS: ${OAR_TENANT_MAINTENANCE_DUE_LOOKAHEAD_MS:-}
      OAR_TENANT_MAINTENANCE_AUDIT_OUTBOX_SINK: ${OAR_TENANT_MAINTENANCE_AUDIT_OUTBOX_SINK:-}
      OAR_TENANT_MAINTENANCE_AUDIT_OUTBOX_WEBHOOK_URL: ${OAR_TENANT_MAINTENANCE_AUDIT_OUTBOX_WEBHOOK_URL:-}
    ports:
      - "8080:8080"
